<html>

<head>
  <title>Express</title>
  <link rel="stylesheet" href="/stylesheets/style.css">
</head>
<body>
  <div id="app">
    <ul>
      <li v-for="fruit in fruits">{{fruit}}</li>
    </ul>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.js"></script>
  <script>
    var vm = new Vue({
      el: "#app",
      data: {
        fruits : ['딸기', '오렌지', '사과', '포도']
      }
    })
  </script>
</body>
</html>
